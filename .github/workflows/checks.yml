name: checks

on:
  push:
    branches: [main]
  pull_request:

# The workflow only reads the checkout; grant nothing else.
permissions:
  contents: read

# One run per ref; a newer push supersedes the older run.
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Pin to the devcontainer's minor so CI verifies the same runtime
          # the plugin is developed against (stdlib-only, but parser/dict
          # ordering details still deserve one truth).
          python-version: '3.12'

      - name: Unit tests (plugin)
        run: python3 plugin/run_tests.py

      - name: Docs audit (doctrine_docs/ corpus)
        run: CLAUDE_PLUGIN_ROOT="$PWD/plugin" python3 plugin/scripts/docs-audit.py --root doctrine_docs --fail-on error

      - name: Projection drift (overview / icd-index / context-map)
        run: python3 plugin/scripts/render-projection.py all --check --docs-root doctrine_docs

      # Bring the reader-facing root docs into the governed term-check pass.
      # docs-audit only scans doctrine_docs/, so README.md, CONTRIBUTING.md and
      # plugin/README.md would otherwise never be checked for banned
      # synonyms / calques (§1). term-check always exits 0 (it is advisory in
      # the hook chain), so gate on its output. spec/doctrine.ja.md is
      # intentionally excluded: it carries the §1 vocabulary tables by
      # definition and would self-flag.
      - name: Term-check root docs (README, CONTRIBUTING, plugin/README)
        run: |
          out=$(CLAUDE_PLUGIN_ROOT="$PWD/plugin" python3 plugin/scripts/term-check.py README.md CONTRIBUTING.md plugin/README.md)
          echo "$out"
          if echo "$out" | grep -q '\[ERROR\]'; then
            echo "::error::term-check found banned-synonym/calque ERRORs in root docs"
            exit 1
          fi
